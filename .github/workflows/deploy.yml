name: Deploy API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      # PI_HOST is reachable only through the Cloudflare Tunnel
      # (ssh.warehouse.mom -> ssh://localhost:22 on the Pi), not on the
      # public internet, so plain TCP to port 22 won't work - the SSH
      # client has to be proxied through `cloudflared access ssh`.
      - name: Configure SSH over Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host pi-deploy
            HostName ${{ secrets.PI_HOST }}
            User ${{ secrets.PI_USER }}
            IdentityFile ~/.ssh/deploy_key
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via SSH
        run: |
          ssh pi-deploy '
            set -e
            cd ~/vehicle_tracker_api

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Cleaning up old images before build..."
            docker image prune -f

            echo "==> Rebuilding and restarting containers..."
            docker compose build
            docker compose up -d

            echo "==> Cleaning up dangling images..."
            docker image prune -f

            echo "==> Deploy complete!"
          '
