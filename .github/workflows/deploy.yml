name: Deploy API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared --version

      - name: Configure SSH over Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          # Записуємо ключ через printf щоб уникнути проблем з переносами рядків
          printf '%s\n' "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Перевіряємо що ключ валідний
          ssh-keygen -l -f ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host pi-deploy
            HostName ${{ secrets.PI_HOST }}
            User ${{ secrets.PI_USER }}
            IdentityFile ~/.ssh/deploy_key
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            PasswordAuthentication no
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH connection
        run: |
          echo "=== Key fingerprint ==="
          ssh-keygen -l -f ~/.ssh/deploy_key
          echo "=== Testing connection ==="
          ssh -vvv pi-deploy 'echo SSH_OK' 2>&1 | grep -E "(Offering|accepts|denied|Permission|SUCCESS|SSH_OK|key)"

      - name: Deploy via SSH
        run: |
          ssh pi-deploy '
            set -e
            cd ~/vehicle_tracker_api
            echo "==> Pulling latest code..."
            git pull origin main
            echo "==> Rebuilding and restarting containers..."
            docker compose build
            docker compose up -d
            docker image prune -f
            echo "==> Deploy complete!"
          '