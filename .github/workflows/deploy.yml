name: Deploy API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Decode deploy key
        run: |
          echo "${{ secrets.PI_SSH_KEY_B64 }}" | base64 -d > "$RUNNER_TEMP/deploy_key"
          # 644, not 600: the ssh-action container reads this as a different
          # UID than the one that wrote it; the runner VM is ephemeral anyway.
          chmod 644 "$RUNNER_TEMP/deploy_key"

      # appleboy/ssh-action runs as a Docker container action; the runner
      # only mounts $RUNNER_TEMP into it at /github/runner_temp, so key_path
      # must reference that container-side path, not the host path.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key_path: /github/runner_temp/deploy_key
          script: |
            set -e
            cd ~/vehicle_tracker_api

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Cleaning up old images before build..."
            docker image prune -f

            echo "==> Rebuilding and restarting containers..."
            docker compose build
            docker compose up -d

            echo "==> Cleaning up dangling images..."
            docker image prune -f

            echo "==> Deploy complete!"